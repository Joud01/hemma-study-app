// ---------- Storage polyfill ----------
// window.storage exists natively inside Claude.ai Artifacts.
// When this app is hosted standalone (outside Claude.ai), that API doesn't
// exist — so we provide a drop-in replacement backed by localStorage with
// the exact same shape, so every loadData/saveData call below works
// unchanged in both environments.

        const raw = localStorage.getItem(key);
        if (raw === null) return null;

          key,
          value: raw,
          shared: false
        };
      } catch {
        return null;
      }
    },
    async set(key, value) {
      try {
        localStorage.setItem(key, value);
        return {
          key,
          value,
          shared: false
        };
      } catch {
        return null;
      }
    },
    async delete(key) {
      try {
        localStorage.removeItem(key);
        return {
          key,
          deleted: true,
          shared: false
        };
      } catch {
        return null;
      }
    },
    async list(prefix) {
      try {
        const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
        return {
          keys,
          prefix,
          shared: false
        };
      } catch {
        return null;
      }
    }
  };
}

    const res = await window.storage.get(key, false);

    return fallback;

          await new Promise(r => setTimeout(r, 1000 * (attempt + 1)));

        }

      const text = (data.content || []).find(b => b.type === "text")?.text || "";
      if (!text) throw new Error("empty response");
      return text;
    } catch (e) {
      clearTimeout(timer);
      lastError = e;
      if (attempt < maxRetries) {
        await new Promise(r => setTimeout(r, 1000 * (attempt + 1)));
        continue;
      }
    }
  }

}

    // Find "units": [ ... and keep only fully-closed objects inside it.

function computeStreak(sessions) {
  if (sessions.length === 0) return 0;
  const days = new Set(sessions.map(s => new Date(s.date).toDateString()));
  let streak = 0;
  let cursor = new Date();
  while (true) {
    if (days.has(cursor.toDateString())) {
      streak++;
      cursor.setDate(cursor.getDate() - 1);
    } else {
      break;
    }
  }
  return streak;
}

// ---------- PDF text extraction (client-side via pdf.js) ----------
let pdfjsLoaded = false;
async function ensurePdfJs() {
  if (pdfjsLoaded && window.pdfjsLib) return;
  await new Promise((resolve, reject) => {
    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    script.onload = resolve;
    script.onerror = reject;
    document.head.appendChild(script);
  });
  window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  pdfjsLoaded = true;
}
async function extractTextFromPdf(file, onProgress) {
  await ensurePdfJs();
  const arrayBuffer = await file.arrayBuffer();
  const pdf = await window.pdfjsLib.getDocument({
    data: arrayBuffer
  }).promise;
  let fullText = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    const pageText = content.items.map(item => item.str).join(" ");
    fullText += pageText + "\n\n";
    if (onProgress) onProgress(i, pdf.numPages);
  }
  return fullText.trim();
}

// ---------- Generic CDN script loader ----------
const loadedScripts = {};
async function loadScript(src) {
  if (loadedScripts[src]) return;
  await new Promise((resolve, reject) => {
    const script = document.createElement("script");
    script.src = src;
    script.onload = resolve;
    script.onerror = () => reject(new Error("script load failed: " + src));
    document.head.appendChild(script);
  });
  loadedScripts[src] = true;
}

// ---------- Word (.docx) extraction via mammoth.js ----------
async function extractTextFromDocx(file) {
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js");
  const arrayBuffer = await file.arrayBuffer();
  const result = await window.mammoth.extractRawText({
    arrayBuffer
  });
  return (result && result.value ? result.value : "").trim();
}

// ---------- PowerPoint (.pptx) extraction via JSZip + slide XML parsing ----------
async function extractTextFromPptx(file, onProgress) {
  await loadScript("https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js");
  const arrayBuffer = await file.arrayBuffer();
  const zip = await window.JSZip.loadAsync(arrayBuffer);

  // Slides live in ppt/slides/slideN.xml — collect and sort them numerically
  const slidePaths = Object.keys(zip.files).filter(p => /^ppt\/slides\/slide\d+\.xml$/.test(p)).sort((a, b) => {
    const na = parseInt(a.match(/slide(\d+)\.xml/)[1], 10);
    const nb = parseInt(b.match(/slide(\d+)\.xml/)[1], 10);
    return na - nb;
  });
  let fullText = "";
  for (let i = 0; i < slidePaths.length; i++) {
    const xml = await zip.files[slidePaths[i]].async("string");
    // Text in pptx lives inside <a:t>...</a:t> runs
    const matches = xml.match(/<a:t>([\s\S]*?)<\/a:t>/g) || [];
    const slideText = matches.map(m => m.replace(/<a:t>/, "").replace(/<\/a:t>/, "")).join(" ")
    // decode the few common XML entities
    .replace(/&amp;/g, "&").replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&quot;/g, '"').replace(/&apos;/g, "'");
    if (slideText.trim()) {
      fullText += `— شريحة ${i + 1} —\n${slideText.trim()}\n\n`;
    }
    if (onProgress) onProgress(i + 1, slidePaths.length);
  }
  return fullText.trim();
}
